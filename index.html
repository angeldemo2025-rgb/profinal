<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inventario PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 8px; margin: 5px; }
    button { padding: 10px; margin: 5px; }
    .item { display: flex; gap: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>Inventario PRO</h2>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 TU FIREBASE */
  const firebaseConfig = {
  apiKey: "AIzaSyCVjGdI5Z3fW8bjHwfBgT5RoOfZZ4Vap8c",
  authDomain: "checklistempresa.firebaseapp.com",
  projectId: "checklistempresa",
  storageBucket: "checklistempresa.firebasestorage.app",
  messagingSenderId: "798095528680",
  appId: "1:798095528680:web:3114c0b18d5b8001826f5d"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔗 PARAMETROS */
const params = new URLSearchParams(window.location.search);

let mode = params.get("mode") || params.get("modo");
let listId = params.get("id");

/* NORMALIZAR */
if (mode) mode = mode.toLowerCase();

/* TRADUCIR */
if (mode === "llenar") mode = "filler";
if (mode === "ver") mode = "viewer";
if (mode === "crear") mode = "creator";

/* DEFAULT */
if (!mode) mode = "creator";

/* ID */
if (!listId) {
  listId = Date.now().toString();
}

/* UI */
const appDiv = document.getElementById("app");
let items = [];

/* AUTOGUARDAR */
async function autoSave() {
  try {
    await setDoc(doc(db, "listas", listId), { items });
  } catch (e) {
    console.error(e);
  }
}

/* RENDER */
function render() {
  appDiv.innerHTML = "";

  const info = document.createElement("p");
  info.textContent = "Modo: " + mode;
  appDiv.appendChild(info);

  /* BOTON AGREGAR (solo creador) */
  if (mode === "creator") {
    const btnAdd = document.createElement("button");
    btnAdd.textContent = "+ Agregar artículo";
    btnAdd.onclick = () => {
      items.push({ name: "", qty: "" });
      render();
    };
    appDiv.appendChild(btnAdd);
  }

  /* ESPACIOS EXTRA PARA LLENADOR */
  if (mode === "filler") {
    const extra = 3;
    const vacios = items.filter(i => !i.name && !i.qty).length;
    for (let i = vacios; i < extra; i++) {
      items.push({ name: "", qty: "" });
    }
  }

  /* LISTA */
  items.forEach((item, index) => {
  const isExtra = !item.name && !item.qty;

  const div = document.createElement("div");
  div.className = "item";

  const name = document.createElement("input");
  name.value = item.name;
  name.placeholder = "Artículo";

  const qty = document.createElement("input");
  qty.type = "number";
  qty.value = item.qty;
  qty.placeholder = "Cantidad";

  let actions = document.createElement("div");

  /* MODOS */
  if (mode === "filler") {
    if (isExtra) {
      name.disabled = false;
    } else {
      name.disabled = true;
    }
    qty.disabled = false;
  } else if (mode === "viewer") {
    name.disabled = true;
    qty.disabled = true;
  } else {
    // creador (modo limpio)
    name.disabled = true;
    qty.disabled = true;
  }

  /* AUTOSAVE */
  name.oninput = (e) => {
    item.name = e.target.value;
    autoSave();
  };

  qty.oninput = (e) => {
    item.qty = e.target.value;
    autoSave();
  };

  /* 👇 TOCAR PARA MOSTRAR OPCIONES */
  if (mode === "creator") {
    div.onclick = () => {
      actions.innerHTML = "";

      const edit = document.createElement("button");
      edit.textContent = "✏️";
      edit.onclick = (e) => {
        e.stopPropagation();
        name.disabled = false;
        qty.disabled = false;
        name.focus();
      };

      const del = document.createElement("button");
      del.textContent = "🗑";
      del.onclick = (e) => {
        e.stopPropagation();
        items.splice(index, 1);
        autoSave();
        render();
      };

      actions.appendChild(edit);
      actions.appendChild(del);
    };
  }

  div.appendChild(name);
  div.appendChild(qty);
  div.appendChild(actions);

  appDiv.appendChild(div);
});

  /* GUARDAR */
  if (mode !== "viewer") {
    const btnSave = document.createElement("button");
    btnSave.textContent = "Guardar";
    btnSave.onclick = autoSave;
    appDiv.appendChild(btnSave);
  }

  /* COMPARTIR */
  const links = document.createElement("div");
  let html = "<p><b>Compartir:</b></p>";

  if (mode === "creator") {
    html += `
      <p>Creador: ${location.origin}?id=${listId}&mode=creator</p>
      <p>Llenador: ${location.origin}?id=${listId}&mode=filler</p>
      <p>Visual: ${location.origin}?id=${listId}&mode=viewer</p>
    `;
  }

  if (mode === "filler") {
    const url = `${location.origin}?id=${listId}&mode=viewer`;

    html += `<p>Enviar resultado:</p><p>${url}</p>`;

    const btn = document.createElement("button");
    btn.textContent = "Compartir por WhatsApp";
    btn.onclick = () => {
      window.open(`https://wa.me/?text=${encodeURIComponent(url)}`);
    };

    appDiv.appendChild(btn);
  }

  if (mode === "viewer") {
    html += `<p>Modo solo lectura</p>`;
  }

  links.innerHTML = html;
  appDiv.appendChild(links);
}

/* CARGAR */
async function loadData() {
  try {
    const ref = doc(db, "listas", listId);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      items = snap.data().items || [];
    } else {
      items = [];
    }

    render();

  } catch (e) {
    document.body.innerHTML = "Error cargando datos";
    console.error(e);
  }
}

loadData();
</script>

</body>
</html>
