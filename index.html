<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Inventario PRO</h2>
<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
let mode = params.get("mode") || "creator";

const app = document.getElementById("app");

if (mode === "creator") {
  app.innerHTML = "<h3>Modo Creador</h3>";
} else if (mode === "filler") {
  app.innerHTML = "<h3>Modo Llenador</h3>";
} else {
  app.innerHTML = "<h3>Modo Visual</h3>";
}
</script>

</body>
</html>
